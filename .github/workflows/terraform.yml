name: Terraform CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, prod]

    defaults:
      run:
        working-directory: infra/envs/${{ matrix.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Configure dummy AWS credentials
        run: |
          echo "AWS_ACCESS_KEY_ID=AKIAFAKEFAKEFAKEFAKE" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=fakeSecretKeyDoesNotNeedToBeRealAtAll123" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -var-file="${{ matrix.environment }}.tfvars" -refresh=false -no-color | tee plan_output.txt

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/envs/${{ matrix.environment }}/plan_output.txt', 'utf8');
            const output = `#### Terraform Plan - ${{ matrix.environment }} 📋
            \`\`\`
            ${plan.substring(0, 60000)}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });